<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly />
        <div class="btns">
            <button class="btn" onclick="addToDisplay('+')">+</button>
            <button onclick="addToDisplay('7')">7</button>
            <button onclick="addToDisplay('8')">8</button>
            <button onclick="addToDisplay('9')">9</button>
            <button class="btn" onclick="addToDisplay('-')">-</button>
            <button onclick="addToDisplay('4')">4</button>
            <button onclick="addToDisplay('5')">5</button>
            <button onclick="addToDisplay('6')">6</button>
            <button class="btn" onclick="addToDisplay('*')">*</button>
            <button onclick="addToDisplay('1')">1</button>
            <button onclick="addToDisplay('2')">2</button>
            <button onclick="addToDisplay('3')">3</button>
            <button  class="btn"onclick="addToDisplay('/')" >/</button>
            <button onclick="addToDisplay('0')">0</button>
            <button onclick="addToDisplay('.')">.</button>
            <button onclick="calculated('=')">=</button>
            <button class="btn" onclick="clear1('')">c</button>
            <button class="btn" onclick="clearHistory('')">h</button>

        </div>
        <div id="history"></div>


    </div>
    <script>
        const display =document.getElementById("display")
        function addToDisplay(input) {
            display.value += input;
        }
        let history=[];
        function calculated(){
            try{ 
                let expression = display.value
                 let results = eval(expression)
                 display.value=results;
                 history.push(expression + "="+results)
                 showHistory();
                }catch(error){
                    display.value="srinadh"
                }
            

           

        }
        function showHistory(){
            let historyDiv=document.getElementById("history")
            historyDiv.innerHTML="";
            history.forEach(item => {
                let p = document.createElement("p")
                p.innerText=item;
                historyDiv.appendChild(p);
            })
            
        }
        showHistory();

        function clear1(){
            display.value =" ";
        }
    </script>
</body>
</html>
